function buildCompras() {
  if (!DATA) return;
  comprasFaturasData = (DATA.faturas || []).slice();
  comprasNCData = (DATA.notas_credito_itens || []).slice();
  comprasExpandedFatura = null;
  comprasFaturaFilter = 'todas';

  // Reset chips
  var chips = document.querySelectorAll('#compras-faturas-chips .compras-chip');
  chips.forEach(function(c) { c.classList.toggle('active', c.textContent.trim() === 'Todas'); });

  // Clear search
  var searchF = document.getElementById('compras-faturas-search');
  var searchS = document.getElementById('compras-stock-search');
  if (searchF) searchF.value = '';
  if (searchS) searchS.value = '';

  // Render active panel
  if (comprasActiveTab === 'faturas') renderComprasFaturas();
  else if (comprasActiveTab === 'stock') renderComprasStock();
  else renderComprasResumo();
}

function setComprasTab(tab) {
  comprasActiveTab = tab;
  ['faturas', 'stock', 'resumo'].forEach(function(t) {
    var btn = document.getElementById('compras-tab-' + t);
    var panel = document.getElementById('compras-panel-' + t);
    if (btn) btn.classList.toggle('active', t === tab);
    if (panel) panel.style.display = t === tab ? '' : 'none';
  });
  if (tab === 'faturas') renderComprasFaturas();
  else if (tab === 'stock') renderComprasStock();
  else renderComprasResumo();
}

function setComprasFaturaFilter(f) {
  comprasFaturaFilter = f;
  var chips = document.querySelectorAll('#compras-faturas-chips .compras-chip');
  var labels = { 'todas': 'Todas', 'por_pagar': 'Por pagar', 'pagas': 'Pagas', 'nc': 'Notas Crédito' };
  chips.forEach(function(c) { c.classList.toggle('active', c.textContent.trim() === labels[f]); });
  renderComprasFaturas();
}

function comprasFmtDate(iso) {
  if (!iso) return '\u2014';
  var p = iso.split('-');
  return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : iso;
}

function comprasFmtVal(v) {
  if (!v && v !== 0) return '\u2014';
  return Number(v).toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' \u20AC';
}

/* ── Faturas rendering ─────────────────────────────────── */
function renderComprasFaturas() {
  if (!DATA) return;
  var faturas = comprasFaturasData;
  var itens = DATA.faturas_itens || [];
  var movs = DATA.materiais_mov || [];
  var search = (document.getElementById('compras-faturas-search').value || '').toLowerCase();

  // Filter by date range
  faturas = faturas.filter(function(f) { return dateInRange(f.data_fatura); });

  // Filter by tab
  var isNC = comprasFaturaFilter === 'nc';
  if (comprasFaturaFilter === 'pagas') faturas = faturas.filter(function(f) { return f.paga && f.tipo_doc !== 'NOTA_CREDITO'; });
  else if (comprasFaturaFilter === 'por_pagar') faturas = faturas.filter(function(f) { return !f.paga && f.tipo_doc !== 'NOTA_CREDITO'; });
  else if (!isNC) faturas = faturas.filter(function(f) { return f.tipo_doc !== 'NOTA_CREDITO'; });
  else faturas = faturas.filter(function(f) { return f.tipo_doc === 'NOTA_CREDITO'; });

  // Search
  if (search) {
    faturas = faturas.filter(function(f) {
      return (f.fornecedor || '').toLowerCase().includes(search) ||
             (f.nr_documento || '').toLowerCase().includes(search) ||
             (f.id_fatura || '').toLowerCase().includes(search);
    });
  }

  // Sort by date desc
  faturas.sort(function(a, b) { return (b.data_fatura || '').localeCompare(a.data_fatura || ''); });

  // Index itens by fatura
  var itensByFatura = {};
  itens.forEach(function(it) {
    if (!itensByFatura[it.id_fatura]) itensByFatura[it.id_fatura] = [];
    itensByFatura[it.id_fatura].push(it);
  });

  // KPIs
  var allInRange = comprasFaturasData.filter(function(f) { return dateInRange(f.data_fatura) && f.tipo_doc !== 'NOTA_CREDITO'; });
  var totalVal = 0, totalPorPagar = 0, countPorPagar = 0;
  allInRange.forEach(function(f) {
    totalVal += f.valor_com_iva || 0;
    if (!f.paga) { totalPorPagar += f.valor_com_iva || 0; countPorPagar++; }
  });
  var kpiEl = document.getElementById('compras-faturas-kpis');
  if (kpiEl) {
    kpiEl.innerHTML =
      '<div class="compras-kpi-pill"><span style="color:var(--text-dim)">' + allInRange.length + ' docs</span><strong>' + comprasFmtVal(totalVal) + '</strong></div>' +
      '<div class="compras-kpi-pill"><span style="color:var(--text-dim)">' + countPorPagar + ' por pagar</span><strong>' + comprasFmtVal(totalPorPagar) + '</strong></div>';
  }

  // Build cards
  var list = document.getElementById('compras-faturas-list');
  if (!faturas.length) {
    list.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-dim);font-size:13px"><i class="fa-solid fa-file-invoice" style="font-size:24px;margin-bottom:8px;display:block;opacity:.4"></i>Sem faturas no per\u00edodo seleccionado.</div>';
    return;
  }

  var html = '';
  faturas.forEach(function(f) {
    var fitens = itensByFatura[f.id_fatura] || [];
    var isNotaCredito = f.tipo_doc === 'NOTA_CREDITO';
    var valor = f.valor_com_iva || 0;

    // Destination bar
    var destStock = 0, destObra = 0, destEscritorio = 0, destViatura = 0;
    fitens.forEach(function(it) {
      var c = it.custo_total_com_iva || 0;
      var d = (it.destino || '').toUpperCase();
      if (d === 'STOCK') destStock += c;
      else if (d === 'ESCRITORIO' || d === 'ESCRITÓRIO') destEscritorio += c;
      else if (d === 'VIATURA' || d === 'MAQUINA' || d === 'GERADOR') destViatura += c;
      else destObra += c;
    });
    var destTotal = destStock + destObra + destEscritorio + destViatura;
    var destBar = '';
    if (destTotal > 0) {
      destBar = '<div class="compras-fatura-destino-bar" title="Stock / Obra / Escritório / Viatura">';
      if (destStock > 0) destBar += '<span class="compras-dest-stock" style="width:' + (destStock/destTotal*100).toFixed(1) + '%"></span>';
      if (destObra > 0) destBar += '<span class="compras-dest-obra" style="width:' + (destObra/destTotal*100).toFixed(1) + '%"></span>';
      if (destEscritorio > 0) destBar += '<span class="compras-dest-escritorio" style="width:' + (destEscritorio/destTotal*100).toFixed(1) + '%"></span>';
      if (destViatura > 0) destBar += '<span class="compras-dest-viatura" style="width:' + (destViatura/destTotal*100).toFixed(1) + '%"></span>';
      destBar += '</div>';
    }

    // Badge
    var badge = '';
    if (isNotaCredito) badge = '<span class="compras-badge compras-badge-nc">NC</span>';
    else if (f.paga) badge = '<span class="compras-badge compras-badge-paga">Paga</span>';
    else badge = '<span class="compras-badge compras-badge-por-pagar">Por pagar</span>';

    // Photo link
    var fotoLink = '';
    if (f.foto_url) {
      fotoLink = '<a class="compras-fatura-foto-link" href="' + f.foto_url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Ver documento"><i class="fa-solid fa-file-pdf"></i> Doc</a>';
    }

    var expanded = comprasExpandedFatura === f.id_fatura;
    var escId = f.id_fatura.replace(/'/g, "\\'");

    html += '<div class="compras-fatura-card" onclick="toggleComprasFaturaDetail(\'' + escId + '\')">';
    html += '<div class="compras-fatura-row1"><span class="compras-fatura-fornecedor">' + (f.fornecedor || '\u2014') + '</span><span class="compras-fatura-data">' + comprasFmtDate(f.data_fatura) + '</span></div>';
    html += '<div class="compras-fatura-row2"><span class="compras-fatura-doc">' + (f.nr_documento || f.id_fatura) + '</span></div>';
    html += '<div class="compras-fatura-row3">';
    html += '<span class="compras-fatura-valor' + (isNotaCredito ? ' nc' : '') + '">' + (isNotaCredito ? '-' : '') + comprasFmtVal(valor) + '</span>';
    html += badge;
    if (fitens.length) html += '<span class="compras-fatura-linhas">' + fitens.length + ' linha' + (fitens.length > 1 ? 's' : '') + '</span>';
    html += destBar;
    html += fotoLink;
    html += '</div>';

    // Expanded detail
    if (expanded && fitens.length) {
      html += '<div class="compras-fatura-detail">';
      // PDF thumbnail
      if (f.foto_url) {
        var fileIdMatch = f.foto_url.match(/\/d\/([^/]+)/);
        if (fileIdMatch) {
          var thumbUrl = 'https://drive.google.com/thumbnail?id=' + fileIdMatch[1] + '&sz=w240';
          html += '<a href="' + f.foto_url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="compras-fatura-thumb-link">';
          html += '<img src="' + thumbUrl + '" class="compras-fatura-thumb" alt="Documento" loading="lazy">';
          html += '<span class="compras-fatura-thumb-label"><i class="fa-solid fa-file-pdf"></i> Abrir documento</span>';
          html += '</a>';
        }
      }
      html += '<div class="compras-timeline">';
      fitens.forEach(function(it) {
        var destLabel = (it.destino || 'OBRA').toUpperCase();
        var isViatura = destLabel === 'VIATURA' || destLabel === 'MAQUINA' || destLabel === 'GERADOR';
        var itemLabel = it.item_oficial || it.descricao_original || '\u2014';
        html += '<div class="compras-timeline-item tl-compra">';
        html += '<div class="compras-tl-head">' + itemLabel + '</div>';
        html += '<div class="compras-tl-sub">' + (it.quantidade || 0) + ' ' + (it.unidade || 'un') + ' \u00D7 ' + comprasFmtVal(it.custo_unit) + ' = ' + comprasFmtVal(it.custo_total_com_iva) + '</div>';
        html += '<div class="compras-tl-sub">';
        if (destLabel === 'STOCK') {
          html += '<span style="color:#3498db">\u2192 Stock</span>';
        } else if (isViatura) {
          var mat = (it.matricula || '').trim();
          var veiculoNome = '';
          if (mat) {
            var matLow = mat.toLowerCase();
            var vEntry = (DATA.veiculos || []).find(function(v) {
              return (v.matricula || '').toLowerCase() === matLow;
            });
            if (vEntry && vEntry.veiculo) veiculoNome = vEntry.veiculo;
          }
          var viaturaLabel;
          if (veiculoNome && mat) {
            viaturaLabel = veiculoNome + ' <span style="color:#95a5a6;font-size:11px">(' + mat + ')</span>';
          } else if (mat) {
            viaturaLabel = mat;
          } else if (veiculoNome) {
            viaturaLabel = veiculoNome;
          } else {
            viaturaLabel = destLabel;
          }
          html += '<span style="color:#9b59b6">\u2192 ' + viaturaLabel + '</span>';
        } else if (it.obra) {
          html += '<span style="color:#e67e22">\u2192 ' + it.obra + (it.fase ? ' / ' + it.fase : '') + '</span>';
        } else {
          html += '<span style="color:#95a5a6">\u2192 ' + destLabel + '</span>';
        }
        html += '</div>';
        html += '</div>';
      });
      html += '</div></div>';
    }
    html += '</div>';
  });

  list.innerHTML = html;
}

function toggleComprasFaturaDetail(id) {
  comprasExpandedFatura = comprasExpandedFatura === id ? null : id;
  renderComprasFaturas();
}

/* ── Stock rendering ───────────────────────────────────── */
function renderComprasStock() {
  if (!DATA) return;
  var stock = (DATA.stock_atual || []).slice();
  var movs = DATA.materiais_mov || [];
  var search = (document.getElementById('compras-stock-search').value || '').toLowerCase();

  // Filter
  if (search) {
    stock = stock.filter(function(s) {
      return (s.item_oficial || '').toLowerCase().includes(search) ||
             (s.material || '').toLowerCase().includes(search) ||
             (s.id_item || '').toLowerCase().includes(search);
    });
  }

  // Sort: items with stock first, then by name
  stock.sort(function(a, b) {
    if (a.stock_atual > 0 && b.stock_atual <= 0) return -1;
    if (a.stock_atual <= 0 && b.stock_atual > 0) return 1;
    return (a.item_oficial || '').localeCompare(b.item_oficial || '');
  });

  // Alert
  var zeroStock = (DATA.stock_atual || []).filter(function(s) { return s.stock_atual <= 0; });
  var alertEl = document.getElementById('compras-stock-alert');
  if (alertEl) {
    alertEl.innerHTML = zeroStock.length > 0
      ? '<i class="fa-solid fa-triangle-exclamation" style="margin-right:6px"></i>' + zeroStock.length + ' ite' + (zeroStock.length === 1 ? 'm' : 'ns') + ' sem stock'
      : '';
  }

  var list = document.getElementById('compras-stock-list');
  if (!stock.length) {
    list.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-dim);font-size:13px"><i class="fa-solid fa-warehouse" style="font-size:24px;margin-bottom:8px;display:block;opacity:.4"></i>Sem dados de stock.</div>';
    return;
  }

  // Index last 3 movements per item
  var movsByItem = {};
  movs.forEach(function(m) {
    if (!m.id_item) return;
    if (!movsByItem[m.id_item]) movsByItem[m.id_item] = [];
    movsByItem[m.id_item].push(m);
  });
  Object.keys(movsByItem).forEach(function(k) {
    movsByItem[k].sort(function(a, b) { return (b.data || '').localeCompare(a.data || ''); });
    movsByItem[k] = movsByItem[k].slice(0, 3);
  });

  var html = '';
  stock.forEach(function(s) {
    var nome = s.item_oficial || s.material || s.id_item;
    var valorStock = s.stock_atual * s.custo_medio_atual;
    html += '<div class="compras-stock-card">';
    html += '<div class="compras-stock-row1"><span class="compras-stock-nome">' + nome + '</span><span class="compras-stock-id">' + s.id_item + '</span></div>';
    html += '<div class="compras-stock-metrics">';
    html += '<span class="compras-stock-metric">Stock: <strong>' + s.stock_atual + ' ' + (s.unidade || 'un') + '</strong></span>';
    html += '<span class="compras-stock-metric">Custo m\u00e9dio: <strong>' + comprasFmtVal(s.custo_medio_atual) + '</strong></span>';
    html += '<span class="compras-stock-metric">Valor: <strong>' + comprasFmtVal(valorStock) + '</strong></span>';
    html += '</div>';

    // Recent movements
    var recent = movsByItem[s.id_item];
    if (recent && recent.length) {
      html += '<div class="compras-stock-movs">';
      recent.forEach(function(m) {
        var isIn = m.tipo === 'ENTRADA';
        html += '<div class="compras-stock-mov-line">';
        html += '<span class="' + (isIn ? 'compras-mov-in' : 'compras-mov-out') + '">' + (isIn ? '+' : '-') + m.quantidade + '</span>';
        html += '<span>' + m.tipo + '</span>';
        if (m.doc_fatura) html += '<span style="color:var(--text-dim)">' + m.doc_fatura + '</span>';
        html += '<span style="color:var(--text-dim)">' + comprasFmtDate(m.data) + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });

  list.innerHTML = html;
}

/* ── Resumo rendering ──────────────────────────────────── */
function renderComprasResumo() {
  if (!DATA) return;
  var faturas = (DATA.faturas || []).filter(function(f) { return dateInRange(f.data_fatura) && f.tipo_doc !== 'NOTA_CREDITO'; });
  var itens = DATA.faturas_itens || [];
  var afetacoes = DATA.afetacoes_obra || [];

  // KPIs
  var totalCompras = 0, totalPorPagar = 0, fornecedoresSet = new Set();
  faturas.forEach(function(f) {
    totalCompras += f.valor_com_iva || 0;
    if (!f.paga) totalPorPagar += f.valor_com_iva || 0;
    if (f.fornecedor) fornecedoresSet.add(f.fornecedor);
  });
  var kpiEl = document.getElementById('compras-resumo-kpis');
  if (kpiEl) {
    kpiEl.innerHTML =
      '<div class="compras-kpi-pill"><span style="color:var(--text-dim)">Total Compras</span><strong>' + comprasFmtVal(totalCompras) + '</strong></div>' +
      '<div class="compras-kpi-pill"><span style="color:var(--text-dim)">Por Pagar</span><strong>' + comprasFmtVal(totalPorPagar) + '</strong></div>' +
      '<div class="compras-kpi-pill"><span style="color:var(--text-dim)">Fornecedores</span><strong>' + fornecedoresSet.size + '</strong></div>';
  }

  // ── Por Fornecedor ──
  var fornMap = {};
  faturas.forEach(function(f) {
    var key = f.fornecedor || '\u2014';
    if (!fornMap[key]) fornMap[key] = { total: 0, count: 0, porPagar: 0 };
    fornMap[key].total += f.valor_com_iva || 0;
    fornMap[key].count++;
    if (!f.paga) fornMap[key].porPagar += f.valor_com_iva || 0;
  });
  var fornArr = Object.entries(fornMap).sort(function(a, b) { return b[1].total - a[1].total; });
  var fornHtml = '';
  fornArr.forEach(function(entry) {
    var nome = entry[0], d = entry[1];
    fornHtml += '<div class="compras-resumo-card">';
    fornHtml += '<div class="compras-resumo-row1"><span class="compras-resumo-nome">' + nome + '</span><span class="compras-resumo-total">' + comprasFmtVal(d.total) + '</span></div>';
    fornHtml += '<div class="compras-resumo-meta">' + d.count + ' fatura' + (d.count > 1 ? 's' : '');
    if (d.porPagar > 0) fornHtml += ' \u2022 ' + comprasFmtVal(d.porPagar) + ' por pagar';
    fornHtml += '</div></div>';
  });
  var fornEl = document.getElementById('compras-resumo-fornecedores');
  if (fornEl) fornEl.innerHTML = fornHtml || '<div style="padding:16px;text-align:center;color:var(--text-dim);font-size:12px">Sem dados.</div>';

  // ── Por Obra ──
  // Use faturas_itens filtered by date for obra breakdown
  var itensInRange = itens.filter(function(it) { return dateInRange(it.data_fatura); });
  var obraMap = {};
  itensInRange.forEach(function(it) {
    var obra = it.obra || '\u2014';
    if (!obraMap[obra]) obraMap[obra] = { material: 0, servico: 0, aluguer: 0, transporte: 0, outro: 0, linhas: 0, fornecedores: new Set() };
    var c = it.custo_total_com_iva || 0;
    var nat = (it.natureza || '').toUpperCase();
    if (nat === 'SERVICO' || nat === 'SERVIÇO') obraMap[obra].servico += c;
    else if (nat === 'ALUGUER') obraMap[obra].aluguer += c;
    else if (nat === 'TRANSPORTE') obraMap[obra].transporte += c;
    else if (nat === 'MATERIAL' || nat === 'GASOLEO' || nat === 'GASOLINA') obraMap[obra].material += c;
    else obraMap[obra].outro += c;
    obraMap[obra].linhas++;
    if (it.fornecedor) obraMap[obra].fornecedores.add(it.fornecedor);
  });
  var obraArr = Object.entries(obraMap).sort(function(a, b) {
    var totA = a[1].material + a[1].servico + a[1].aluguer + a[1].transporte + a[1].outro;
    var totB = b[1].material + b[1].servico + b[1].aluguer + b[1].transporte + b[1].outro;
    return totB - totA;
  });
  var obraHtml = '';
  obraArr.forEach(function(entry) {
    var obra = entry[0], d = entry[1];
    var total = d.material + d.servico + d.aluguer + d.transporte + d.outro;
    if (total <= 0) return;
    obraHtml += '<div class="compras-resumo-card">';
    obraHtml += '<div class="compras-resumo-row1"><span class="compras-resumo-nome">' + obra + '</span><span class="compras-resumo-total">' + comprasFmtVal(total) + '</span></div>';
    obraHtml += '<div class="compras-resumo-meta">' + d.linhas + ' linha' + (d.linhas > 1 ? 's' : '') + ' \u2022 ' + d.fornecedores.size + ' fornecedor' + (d.fornecedores.size > 1 ? 'es' : '') + '</div>';
    // Stacked bar
    obraHtml += '<div class="compras-resumo-bar">';
    if (d.material > 0) obraHtml += '<span class="compras-dest-stock" style="width:' + (d.material/total*100).toFixed(1) + '%" title="Material: ' + comprasFmtVal(d.material) + '"></span>';
    if (d.servico > 0) obraHtml += '<span class="compras-dest-viatura" style="width:' + (d.servico/total*100).toFixed(1) + '%" title="Servi\u00e7o: ' + comprasFmtVal(d.servico) + '"></span>';
    if (d.aluguer > 0) obraHtml += '<span class="compras-dest-escritorio" style="width:' + (d.aluguer/total*100).toFixed(1) + '%" title="Aluguer: ' + comprasFmtVal(d.aluguer) + '"></span>';
    if (d.transporte > 0) obraHtml += '<span class="compras-dest-obra" style="width:' + (d.transporte/total*100).toFixed(1) + '%" title="Transporte: ' + comprasFmtVal(d.transporte) + '"></span>';
    obraHtml += '</div>';
    obraHtml += '</div>';
  });
  var obraEl = document.getElementById('compras-resumo-obras');
  if (obraEl) obraEl.innerHTML = obraHtml || '<div style="padding:16px;text-align:center;color:var(--text-dim);font-size:12px">Sem dados.</div>';
}

/* ══════════════════════════════════════════════════════════
   MAPA MENSAL
   ══════════════════════════════════════════════════════════ */

function buildMapaMensal() {
  const monthSelect = document.getElementById('mapa-mensal-month');
  const meta = document.getElementById('mapa-mensal-summary-meta');
  const tbody = document.getElementById('mapa-mensal-tbody');
  const tfoot = document.getElementById('mapa-mensal-tfoot');
  if (!monthSelect || !meta || !tbody || !tfoot) return;

  const months = getMapaMensalMonths_();
  if (!months.length) {
    monthSelect.innerHTML = '<option value="">Sem meses disponíveis</option>';
    meta.innerHTML = '<span class="mapa-mensal-meta-chip"><i class="fa-solid fa-circle-info"></i><strong>Sem dados</strong> nos registos disponíveis.</span>';
    tbody.innerHTML = '<tr><td colspan="8" class="mapa-mensal-empty"><i class="fa-solid fa-file-invoice-dollar"></i>Sem dados suficientes para construir o mapa mensal.</td></tr>';
    tfoot.innerHTML = '';
    return;
  }

  if (!months.includes(mapaMensalMonth)) {
    mapaMensalMonth = getMapaMensalDefaultMonth_(months);
    mapaMensalStatus = getMapaMensalDefaultStatus_(mapaMensalMonth);
  }

  renderMapaMensalControls_(months);
  renderMapaMensalSummary_(buildMapaMensalData_(mapaMensalMonth, mapaMensalStatus));
}

function getMapaMensalMonths_() {
  if (!DATA || !Array.isArray(DATA.registos)) return [];
  return [...new Set((DATA.registos || []).map(r => String(r.data || '').slice(0, 7)).filter(v => /^\d{4}-\d{2}$/.test(v)))].sort().reverse();
}

function getMapaMensalDefaultMonth_(months) {
  const currentMonthKey = new Date().toISOString().slice(0, 7);
  return months.includes(currentMonthKey) ? currentMonthKey : (months[0] || '');
}

function getMapaMensalDefaultStatus_(monthKey) {
  return monthKey === new Date().toISOString().slice(0, 7) ? 'provisorio' : 'fechado';
}

function renderMapaMensalControls_(months) {
  const monthSelect = document.getElementById('mapa-mensal-month');
  if (!monthSelect) return;

  monthSelect.innerHTML = months.map(monthKey => {
    const selected = monthKey === mapaMensalMonth ? ' selected' : '';
    return '<option value="' + monthKey + '"' + selected + '>' + escapeHtml_(formatMapaMensalMonthLabel_(monthKey)) + '</option>';
  }).join('');

  ['provisorio', 'fechado'].forEach(status => {
    const btn = document.getElementById('mapa-mensal-status-' + status);
    if (!btn) return;
    btn.classList.toggle('active', mapaMensalStatus === status);
  });
}

function setMapaMensalMonth(monthKey) {
  if (!monthKey || monthKey === mapaMensalMonth) return;
  mapaMensalMonth = monthKey;
  mapaMensalStatus = getMapaMensalDefaultStatus_(monthKey);
  buildMapaMensal();
}

function setMapaMensalStatus(status) {
  if (status !== 'provisorio' && status !== 'fechado') return;
  mapaMensalStatus = status;
  buildMapaMensal();
}

function buildMapaMensalData_(monthKey, status) {
  const cacheKey = monthKey + '|' + status;
  if (mapaMensalCache[cacheKey]) return mapaMensalCache[cacheKey];

  const range = getMapaMensalRange_(monthKey, status);
  const registos = (DATA && Array.isArray(DATA.registos) ? DATA.registos : []).filter(r => {
    const dateKey = String(r.data || '').slice(0, 10);
    return /^\d{4}-\d{2}-\d{2}$/.test(dateKey) && dateKey >= range.start && dateKey <= range.effective_end;
  });

  const dayMap = {};
  registos.forEach(r => {
    const nome = String(r.nome || '').trim();
    const dateKey = String(r.data || '').slice(0, 10);
    if (!nome || !/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) return;

    const workerDayKey = nome + '||' + dateKey;
    if (!dayMap[workerDayKey]) {
      dayMap[workerDayKey] = {
        nome: nome,
        date: dateKey,
        raw_minutes: 0,
        atraso_min: 0,
        has_dps: false,
        absence_codes: new Set()
      };
    }

    const day = dayMap[workerDayKey];
    day.raw_minutes += Math.max(0, Math.round((Number(r.horas) || 0) * 60));
    day.atraso_min += Number(r.atraso_min) || 0;

    if (r.dispensado) day.has_dps = true;

    const absenceCode = getMapaAusenciaCode_(r);
    if (absenceCode === 'Dps') day.has_dps = true;
    else if (absenceCode) day.absence_codes.add(absenceCode);
  });

  const workerMap = {};
  Object.keys(dayMap).forEach(key => {
    const rawDay = dayMap[key];
    const finalDay = consolidateMapaMensalDay_(rawDay);
    const nome = rawDay.nome;

    if (!workerMap[nome]) {
      workerMap[nome] = {
        nome: nome,
        total_minutes_valid: 0,
        atrasos_min: 0,
        counts: { F: 0, FJ: 0, Bxa: 0, Fer: 0, Dps: 0 },
        cells: {}
      };
    }

    const worker = workerMap[nome];
    worker.total_minutes_valid += finalDay.valid_minutes;
    worker.atrasos_min += rawDay.atraso_min;
    if (finalDay.code) worker.counts[finalDay.code] += 1;
    worker.cells[rawDay.date] = finalDay;
  });

  const workers = Object.values(workerMap)
    .filter(worker => {
      const hasValidHours = worker.total_minutes_valid > 0;
      const hasBlockingAbsence = !!(
        (worker.counts && worker.counts.F > 0) ||
        (worker.counts && worker.counts.FJ > 0) ||
        (worker.counts && worker.counts.Bxa > 0) ||
        (worker.counts && worker.counts.Fer > 0)
      );
      return hasValidHours || hasBlockingAbsence;
    })
    .sort((a, b) => {
      const aHasValidHours = a.total_minutes_valid > 0 ? 1 : 0;
      const bHasValidHours = b.total_minutes_valid > 0 ? 1 : 0;
      if (aHasValidHours !== bHasValidHours) return bHasValidHours - aHasValidHours;

      const aHasDps = (a.counts && a.counts.Dps > 0) ? 1 : 0;
      const bHasDps = (b.counts && b.counts.Dps > 0) ? 1 : 0;
      if (aHasValidHours && bHasValidHours && aHasDps !== bHasDps) return aHasDps - bHasDps;

      return a.nome.localeCompare(b.nome, 'pt-PT');
    })
    .map(worker => {
      const diasInteiros = Math.floor(worker.total_minutes_valid / 480);
      return {
        nome: worker.nome,
        total_minutes_valid: worker.total_minutes_valid,
        total_horas_label: formatMapaTotalHoursLabel_(worker.total_minutes_valid),
        dias_equiv_int: diasInteiros,
        dias_compact_label: formatMapaCompactDaysLabel_(worker.total_minutes_valid),
        atrasos_min: worker.atrasos_min,
        atrasos_label: formatMapaAtrasoDisplay_(worker.atrasos_min),
        counts: worker.counts,
        cells: worker.cells
      };
    });

  const totals = {
    workers: workers.length,
    minutes_valid: workers.reduce((sum, worker) => sum + worker.total_minutes_valid, 0),
    counts: workers.reduce((acc, worker) => {
      acc.F += worker.counts.F;
      acc.FJ += worker.counts.FJ;
      acc.Bxa += worker.counts.Bxa;
      acc.Fer += worker.counts.Fer;
      acc.Dps += worker.counts.Dps;
      return acc;
    }, { F: 0, FJ: 0, Bxa: 0, Fer: 0, Dps: 0 }),
    atrasos_min: workers.reduce((sum, worker) => sum + worker.atrasos_min, 0)
  };

  const out = {
    month: monthKey,
    month_label: formatMapaMensalMonthLabel_(monthKey),
    status: status,
    generated_at: (DATA && DATA.generated_at) || '',
    period: range,
    days: buildMapaMensalDays_(monthKey),
    workers: workers,
    totals: totals
  };

  mapaMensalCache[cacheKey] = out;
  return out;
}

function getMapaMensalRange_(monthKey, status) {
  const [year, month] = String(monthKey || '').split('-').map(Number);
  const start = monthKey + '-01';
  const endDate = new Date(year, month, 0);
  const end = monthKey + '-' + String(endDate.getDate()).padStart(2, '0');
  const todayKey = new Date().toISOString().slice(0, 10);
  let effectiveEnd = end;

  if (status === 'provisorio' && todayKey < end) {
    effectiveEnd = todayKey < start ? start : todayKey;
  }

  return {
    start: start,
    end: end,
    effective_end: effectiveEnd
  };
}

function buildMapaMensalDays_(monthKey) {
  const [year, month] = String(monthKey || '').split('-').map(Number);
  if (!year || !month) return [];
  const daysInMonth = new Date(year, month, 0).getDate();
  const weekdayNames = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'];
  const out = [];
  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month - 1, day);
    const weekday = date.getDay();
    out.push({
      date: monthKey + '-' + String(day).padStart(2, '0'),
      day_number: day,
      weekday_short: weekdayNames[weekday],
      weekend_type: weekday === 0 ? 'dom' : (weekday === 6 ? 'sab' : 'weekday')
    });
  }
  return out;
}

function getMapaAusenciaCode_(registo) {
  if (!registo) return '';
  if (registo.dispensado) return 'Dps';

  const motivo = normalizeMapaMotivo_(registo.motivo);
  const compact = motivo.replace(/[^a-z]/g, '');

  if (compact === 'f' || compact === 'fi' || motivo.indexOf('injustificada') !== -1) return 'F';
  if (compact === 'fj' || compact === 'js' || motivo.indexOf('justificada') !== -1) return 'FJ';
  if (compact === 'bxa' || motivo.indexOf('baixa') !== -1) return 'Bxa';
  if (compact === 'fer' || motivo.indexOf('ferias') !== -1 || motivo.indexOf('feria') !== -1) return 'Fer';
  if (registo.falta) return 'F';
  return '';
}

function normalizeMapaMotivo_(value) {
  return String(value || '')
    .trim()
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function consolidateMapaMensalDay_(day) {
  const blockingCode = pickMapaBlockingCode_(day.absence_codes);
  if (day.has_dps) {
    return {
      raw_minutes: day.raw_minutes,
      valid_minutes: 0,
      atraso_min: day.atraso_min || 0,
      code: 'Dps',
      display: 'Dsp',
      suppress_hours: true,
      is_dps_with_hours: false
    };
  }

  if (blockingCode) {
    return {
      raw_minutes: day.raw_minutes,
      valid_minutes: 0,
      atraso_min: day.atraso_min || 0,
      code: blockingCode,
      display: blockingCode,
      suppress_hours: true,
      is_dps_with_hours: false
    };
  }

  return {
    raw_minutes: day.raw_minutes,
    valid_minutes: Math.max(0, day.raw_minutes - (day.atraso_min || 0)),
    atraso_min: day.atraso_min || 0,
    code: '',
    display: (day.raw_minutes > 0 || (day.atraso_min || 0) > 0)
      ? formatMapaDayHoursLabel_(Math.max(0, day.raw_minutes - (day.atraso_min || 0)))
      : '',
    suppress_hours: false,
    is_dps_with_hours: false
  };
}

function pickMapaBlockingCode_(codes) {
  const set = codes instanceof Set ? codes : new Set(codes || []);
  const order = ['F', 'FJ', 'Bxa', 'Fer'];
  for (let i = 0; i < order.length; i++) {
    if (set.has(order[i])) return order[i];
  }
  return '';
}

function formatMapaMensalMonthLabel_(monthKey) {
  if (!/^\d{4}-\d{2}$/.test(String(monthKey || ''))) return monthKey || '—';
  const months = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
  const [year, month] = monthKey.split('-').map(Number);
  return months[month - 1] + ' ' + year;
}

function formatMapaDayHoursLabel_(minutes) {
  const total = Math.max(0, Number(minutes) || 0);
  const hours = Math.floor(total / 60);
  const mins = total % 60;
  return mins ? (hours + ':' + String(mins).padStart(2, '0')) : String(hours);
}

function formatMapaTotalHoursLabel_(minutes) {
  return formatMapaDayHoursLabel_(minutes);
}

function formatMapaCompactDaysLabel_(minutes) {
  const total = Math.max(0, Number(minutes) || 0);
  const days = Math.floor(total / 480);
  const remainder = total % 480;
  if (!remainder) return String(days);

  const hours = Math.floor(remainder / 60);
  const mins = remainder % 60;
  const compactHours = mins ? (hours + ':' + String(mins).padStart(2, '0')) : String(hours);
  return days + '+' + compactHours;
}

function formatMapaAtrasoDisplay_(minutes) {
  return minutes > 0 ? fmtMin(minutes) : '—';
}

function renderMapaMensalSummary_(mapaData) {

    '<span class="mapa-mensal-meta-chip"><i class="fa-solid fa-users"></i><strong>' + mapaData.totals.workers + '</strong> trabalhador(es)</span>',

    '<span class="mapa-mensal-meta-chip"><i class="fa-solid fa-calendar-day"></i><strong>' + escapeHtml_(mapaData.period.start.split('-').reverse().join('/')) + '</strong> até <strong>' + escapeHtml_(mapaData.period.effective_end.split('-').reverse().join('/')) + '</strong></span>'
  ].join('');

  }

  tbody.innerHTML = mapaData.workers.map(worker => {

        '<td data-label="Fér" class="td-center td-mono' + (worker.counts.Fer > 0 ? ' mapa-mensal-absence-cell' : '') + '">' + worker.counts.Fer + '</td>' +

  }).join('');

  tfoot.innerHTML = '<tr class="mapa-mensal-totals-row">' +
    '<td>Total</td>' +
    '<td class="td-center td-mono">' + escapeHtml_(formatMapaCompactDaysLabel_(mapaData.totals.minutes_valid)) + '</td>' +
    '<td class="td-right td-mono">' + escapeHtml_(formatMapaTotalHoursLabel_(mapaData.totals.minutes_valid)) + '</td>' +
    '<td class="td-center td-mono' + (mapaData.totals.counts.F > 0 ? ' mapa-mensal-absence-cell' : '') + '">' + mapaData.totals.counts.F + '</td>' +
    '<td class="td-center td-mono' + (mapaData.totals.counts.FJ > 0 ? ' mapa-mensal-absence-cell' : '') + '">' + mapaData.totals.counts.FJ + '</td>' +
    '<td class="td-center td-mono' + (mapaData.totals.counts.Bxa > 0 ? ' mapa-mensal-absence-cell' : '') + '">' + mapaData.totals.counts.Bxa + '</td>' +
    '<td class="td-center td-mono' + (mapaData.totals.counts.Fer > 0 ? ' mapa-mensal-absence-cell' : '') + '">' + mapaData.totals.counts.Fer + '</td>' +
    '<td class="td-right td-mono">' + escapeHtml_(formatMapaAtrasoDisplay_(mapaData.totals.atrasos_min)) + '</td>' +
    '</tr>';

  renderMapaMensalPrintView_(mapaData);
}

      '<td class="mapa-print-summary-col mapa-print-summary-cell is-absence' + (worker.counts.Fer > 0 ? '' : ' is-zero') + '">' + worker.counts.Fer + '</td>' +
      '<td class="mapa-print-summary-col">' + escapeHtml_(worker.atrasos_label) + '</td>' +
      '</tr>';
  }).join('');

  container.innerHTML =
    '<div class="mapa-print-sheet">' +
      '<div class="mapa-print-header">' +
        '<div>' +
          '<div class="mapa-print-title">Mapa Mensal de Pagamento</div>' +
          '<div class="mapa-print-subtitle">Doutor Martelo · ' + escapeHtml_(mapaData.month_label) + '</div>' +
        '</div>' +
        '<div class="mapa-print-meta">' +
          '<span class="mapa-print-pill"><i class="fa-solid fa-flag"></i>' + escapeHtml_(mapaData.status === 'provisorio' ? 'Provisório' : 'Fechado') + '</span>' +
          '<span class="mapa-print-pill"><i class="fa-solid fa-users"></i>' + mapaData.totals.workers + ' trabalhadores</span>' +
          '<span class="mapa-print-pill"><i class="fa-solid fa-clock"></i>' + escapeHtml_(formatMapaTotalHoursLabel_(mapaData.totals.minutes_valid)) + ' h liquidas</span>' +
          '<span class="mapa-print-pill"><i class="fa-solid fa-calendar-day"></i>' + escapeHtml_(mapaData.generated_at || '') + '</span>' +
        '</div>' +

function generateDistinctColors(n) {
  const colors = [];
  for (let i = 0; i < n; i++) {
    const hue = (i * 360 / n + 10) % 360;
    colors.push('hsl(' + hue + ', 70%, 60%)');
  }
  return colors;
}

function compactCompCustosObrasForMobile_(items, selectedMetrics) {
  const list = Array.isArray(items) ? items.slice() : [];
  if (!isMobile() || list.length <= MOBILE_COMP_CUSTOS_TOP_OBRAS) return list;

  const metrics = Array.isArray(selectedMetrics) ? selectedMetrics.slice() : [];
  const sorted = list.sort((a, b) => (b.sortValue || 0) - (a.sortValue || 0));
  const top = sorted.slice(0, MOBILE_COMP_CUSTOS_TOP_OBRAS);
  const rest = sorted.slice(MOBILE_COMP_CUSTOS_TOP_OBRAS);
  const restValue = rest.reduce((sum, item) => sum + (Number(item.sortValue) || 0), 0);
  if (restValue > 0) {
    const grouped = { name: 'Outras Obras', sortValue: restValue, values: {}, _isGroupedOther: true };
    metrics.forEach(metric => {
      grouped.values[metric] = rest.reduce((sum, item) => sum + (Number(item.values && item.values[metric]) || 0), 0);
    });
    top.push(grouped);
  }
  return top;
}

function getCompCustosSelectedMetrics_() {
  const selected = ['mao_obra', 'materiais', 'deslocacoes', 'total'].filter(metric => !!compCustosMetricState[metric]);
  if (!selected.length) {
    compCustosMetricState.mao_obra = true;
    return ['mao_obra'];
  }
  if (selected.includes('total') && selected.length > 1) {
    Object.keys(compCustosMetricState).forEach(metric => {
      compCustosMetricState[metric] = metric === 'total';
    });
    return ['total'];
  }
  return selected;
}

function setCompCustosTypeAvailability_(items, selectedMetrics) {
  const doughnutBtn = document.getElementById('comp-custos-type-doughnut');
  const count = Array.isArray(items) ? items.length : 0;
  const metricCount = Array.isArray(selectedMetrics) ? selectedMetrics.length : 0;
  compCustosDoughnutEnabled = metricCount === 1 && (!isMobile() || count <= MOBILE_COMP_CUSTOS_MAX_DOUGHNUT);

  if (doughnutBtn) {
    doughnutBtn.disabled = !compCustosDoughnutEnabled;
    doughnutBtn.setAttribute('aria-disabled', compCustosDoughnutEnabled ? 'false' : 'true');
    doughnutBtn.title = compCustosDoughnutEnabled
      ? 'Mostrar grafico circular'
      : 'O circular so fica disponivel com uma unica metrica ativa' + (isMobile() ? ' e ate ' + MOBILE_COMP_CUSTOS_MAX_DOUGHNUT + ' obras no mobile' : '');
  }

  if (!compCustosDoughnutEnabled && compCustosChartType === 'doughnut') {
    compCustosChartType = 'bar';
  }
}

function pruneCompCustosObraState_(obraNames) {
  const valid = new Set(obraNames || []);
  Object.keys(compCustosHiddenObras).forEach(name => {
    if (!valid.has(name)) delete compCustosHiddenObras[name];
  });
}

function ensureCompCustosCanvas_() {
  const wrap = document.getElementById('comp-custos-canvas-wrap');
  if (!wrap) return null;
  if (!document.getElementById('comp-chart-custos')) {
    wrap.innerHTML = '<canvas id="comp-chart-custos"></canvas>';
  }
  return document.getElementById('comp-chart-custos');
}

function getVisibleCompObraNames_(obraNames) {
  const list = Array.isArray(obraNames) ? obraNames : [];
  return list.filter(name => !compCustosHiddenObras[name]);
}

function syncCompCustosControls_(obraNames) {
  pruneCompCustosObraState_(obraNames);
  const selectedMetrics = getCompCustosSelectedMetrics_();

  ['mao_obra', 'materiais', 'deslocacoes', 'total'].forEach(metric => {
    const btn = document.getElementById('comp-custos-metric-' + metric);
    if (!btn) return;
    btn.classList.toggle('active', selectedMetrics.includes(metric));
  });

  [['bar', 'comp-custos-type-bar'], ['doughnut', 'comp-custos-type-doughnut']].forEach(([type, id]) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.classList.toggle('active', compCustosChartType === type);
  });

  const label = document.getElementById('comp-custos-obras-label');
  if (label) {
    const hiddenCount = (obraNames || []).reduce((acc, name) => acc + (compCustosHiddenObras[name] ? 1 : 0), 0);
    label.textContent = 'Obras visiveis' + (hiddenCount ? ' (' + hiddenCount + ' oculta(s))' : '');
  }

  const row = document.getElementById('comp-custos-obras-row');
  if (!row) return;
  const list = Array.isArray(obraNames) ? obraNames : [];
  if (!list.length) {
    row.innerHTML = '<span class="obra-fase-filter-empty">Sem obras disponiveis.</span>';
    return;
  }

  row.innerHTML = list.map(name => {
    const hidden = !!compCustosHiddenObras[name];
    const safeName = escapeHtml_(name);
    const encoded = encodeURIComponent(name);
    return '<button type="button" class="obra-fase-chip' + (hidden ? ' hidden' : '') + '"' +
      ' onclick="toggleCompCustosObra(\'' + encoded + '\')"' +
      ' aria-pressed="' + (hidden ? 'true' : 'false') + '"' +
      ' title="' + safeName + '">' + safeName + '</button>';
  }).join('');
}

function setCompCustosMetric(metric) {
  const allowed = { mao_obra: true, materiais: true, deslocacoes: true, total: true };
  if (!allowed[metric]) return;
  const baseMetrics = ['mao_obra', 'materiais', 'deslocacoes'];
  if (metric === 'total') {
    if (compCustosMetricState.total) return;
    Object.keys(compCustosMetricState).forEach(key => { compCustosMetricState[key] = false; });
    compCustosMetricState.total = true;
  } else if (compCustosMetricState.total) {
    Object.keys(compCustosMetricState).forEach(key => { compCustosMetricState[key] = false; });
    compCustosMetricState[metric] = true;
  } else {
    const activeBaseCount = baseMetrics.reduce((acc, key) => acc + (compCustosMetricState[key] ? 1 : 0), 0);
    if (compCustosMetricState[metric] && activeBaseCount <= 1) return;
    compCustosMetricState[metric] = !compCustosMetricState[metric];
    compCustosMetricState.total = false;
  }
  buildCompCustosChart(getCompObraNames_());
}

function setCompCustosChartType(type) {
  const allowed = { bar: true, doughnut: true };
  if (!allowed[type]) return;
  if (type === 'doughnut' && !compCustosDoughnutEnabled) return;
  compCustosChartType = type;
  buildCompCustosChart(getCompObraNames_());
}

function toggleCompCustosObra(obraEncoded) {
  const obraName = decodeURIComponent(String(obraEncoded || ''));
  if (!obraName) return;
  const obraNames = getCompObraNames_();
  if (!obraNames.includes(obraName)) return;

  const hideObra = !compCustosHiddenObras[obraName];
  if (hideObra) {
    const visibleCount = obraNames.reduce((acc, name) => acc + (compCustosHiddenObras[name] ? 0 : 1), 0);
    if (visibleCount <= 1) return;
  }
  compCustosHiddenObras[obraName] = hideObra;
  buildCompCustosChart(obraNames);
}

function resetCompCustosObrasVisibility() {
  Object.keys(compCustosHiddenObras).forEach(name => {
    compCustosHiddenObras[name] = false;
  });
  buildCompCustosChart(getCompObraNames_());
}

function clearCompCustosObrasVisibility() {
  getCompObraNames_().forEach(name => {
    compCustosHiddenObras[name] = true;
  });
  buildCompCustosChart(getCompObraNames_());
}

function buildCompCustosChart(obraNames) {
  if (compCharts.custos) compCharts.custos.destroy();
  const allObraNames = Array.isArray(obraNames) ? obraNames : [];
  const selectedMetrics = getCompCustosSelectedMetrics_();
  const snapshot = getCurrentRangeSnapshot_();

  pruneCompCustosObraState_(allObraNames);
  const visibleObraNames = getVisibleCompObraNames_(allObraNames);
  updateCompCustosPeriodLabel_();
  syncCompCustosControls_(allObraNames);

  // Aggregate deslocações (date-filtered)
  const deslPerObra = snapshot.deslocacoesByObra;

  // Aggregate labour from obra daily totals (date-filtered)
  const labourPerObra = {};
  allObraNames.forEach(n => {
    labourPerObra[n] = 0;
    (snapshot.registosByObra[n] || []).forEach(r => {
      labourPerObra[n] += Number(r.custo) || 0;
    });
    (snapshot.legacyMaoByObra[n] || []).forEach(r => {
      labourPerObra[n] += Number(r.custo) || 0;
    });
  });

  const metricLabelMap = {
    mao_obra: 'Mao de Obra',
    materiais: 'Materiais',
    deslocacoes: 'Deslocacoes',
    total: 'Total'
  };
  const metricColorMap = {
    mao_obra: 'rgba(99,179,237,.78)',
    materiais: 'rgba(72,187,120,.78)',
    deslocacoes: 'rgba(246,173,85,.78)',
    total: 'rgba(233,69,96,.78)'
  };

  const chartBaseItems = visibleObraNames.map(name => {
    const maoObra = labourPerObra[name] || 0;
    const materiais = sumMateriaisByObra(name) || 0;
    const deslocacoes = deslPerObra[name] || 0;
    const total = maoObra + materiais + deslocacoes;
    const values = { mao_obra: maoObra, materiais, deslocacoes, total };
    const sortValue = selectedMetrics.includes('total')
      ? total
      : selectedMetrics.reduce((sum, metric) => sum + (Number(values[metric]) || 0), 0);
    return {
      name,
      values,
      sortValue
    };
  }).filter(item => selectedMetrics.some(metric => (Number(item.values[metric]) || 0) > 0));

  const chartItems = compactCompCustosObrasForMobile_(chartBaseItems, selectedMetrics)
    .sort((a, b) => (b.sortValue || 0) - (a.sortValue || 0));
  setCompCustosTypeAvailability_(chartItems, selectedMetrics);
  syncCompCustosControls_(allObraNames);

  if (isMobile() && compCustosChartType === 'doughnut' && !compCustosDoughnutEnabled) {
    compCustosChartType = 'bar';
    syncCompCustosControls_(allObraNames);
  }

  const ctx = ensureCompCustosCanvas_();
  if (!ctx) return;
  if (!visibleObraNames.length) {
    const wrap = document.getElementById('comp-custos-canvas-wrap');
    if (wrap) wrap.innerHTML = '<div class="no-chart-data">Selecione obras para visualizar</div>';
    return;
  }
  if (!chartItems.length) {
    const wrap = document.getElementById('comp-custos-canvas-wrap');
    if (wrap) wrap.innerHTML = '<div class="no-chart-data">Sem obras no periodo</div>';
    return;
  }

  const chartType = compCustosChartType === 'doughnut' ? 'doughnut' : 'bar';
  const datasets = chartType === 'doughnut'
    ? [{
        label: metricLabelMap[selectedMetrics[0]] || 'Custo',
        data: chartItems.map(item => Number(item.values[selectedMetrics[0]]) || 0),
        backgroundColor: chartItems.map((_, i) => CHART_PALETTE[i % CHART_PALETTE.length]),
        borderRadius: 0,
        borderWidth: 1
      }]
    : selectedMetrics.map(metric => ({
        label: metricLabelMap[metric] || 'Custo',
        data: chartItems.map(item => Number(item.values[metric]) || 0),
        backgroundColor: metricColorMap[metric] || 'rgba(99,179,237,.78)',
        borderRadius: 4,
        borderWidth: 0,
        categoryPercentage: 0.86,
        barPercentage: 1
      }));
  compCharts.custos = new Chart(ctx, {
    type: chartType,
    data: {
      labels: chartItems.map(item => item.name),
      datasets: datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)
        ? false
        : { duration: isMobile() ? 180 : 260, easing: 'easeOutCubic' },
      cutout: chartType === 'doughnut' ? '56%' : undefined,
      plugins: {
        legend: chartType === 'doughnut'
          ? {
              display: true,
              position: 'bottom',
              labels: {
                boxWidth: 10,
                font: { size: isMobile() ? 10 : 11 },
                padding: isMobile() ? 6 : 8,
                generateLabels: chart => {
                  const base = Chart.defaults.plugins.legend.labels.generateLabels(chart);
                  if (!isMobile()) return base;
                  return base.map(it => Object.assign({}, it, { text: abbreviateChartLabel_(it.text, 12) }));
                }
              }
            }
          : (selectedMetrics.length > 1 ? mLegend({ position: isMobile() ? 'bottom' : 'top' }) : { display: false }),
        tooltip: {
          callbacks: {
            title: items => {
              if (!items || !items.length) return '';
              return String(items[0].label || '');
            },
            label: tipCtx => tipCtx.dataset.label + ': ' + fmt(tipCtx.raw)
          }
        }
      },
      scales: chartType === 'bar'
        ? {
            y: {
              grid: { color: 'rgba(255,255,255,.04)' },
              ticks: {
                font: { size: isMobile() ? 9 : 10 },
                callback: v => v >= 1000 ? (v / 1000).toFixed(0) + 'k \u20ac' : v + ' \u20ac'
              }
            },
            x: {
              grid: { display: false },
              ticks: {
                font: { size: isMobile() ? 9 : 10 },
                callback: val => {
                  const idx = Number(val);
                  const label = Number.isFinite(idx) && chartItems[idx] ? chartItems[idx].name : String(val);
                  return isMobile() ? abbreviateChartLabel_(label, 10) : label;
                }
              }
            }
          }
        : undefined
    }
  });
}

  const allObraNames = getCompObraNames_();
  const phaseItems = collectAvailableCompFases_(allObraNames);
  const key = normalizeFaseKey_(faseName);
  if (!phaseItems.some(item => item.key === key)) return;

  const hidePhase = !compFasesTotalHiddenKeys[key];
  if (hidePhase) {
    const visibleCount = phaseItems.reduce((acc, item) => acc + (compFasesTotalHiddenKeys[item.key] ? 0 : 1), 0);
    if (visibleCount <= 1) return;
  }
  compFasesTotalHiddenKeys[key] = hidePhase;
  buildCompFasesTotalChart(allObraNames);
}

function collectCompFasesTotalMultiData_(selectedObras, selectedMetrics) {
  const metrics = Array.isArray(selectedMetrics) && selectedMetrics.length ? selectedMetrics.slice() : ['mao_obra'];
  const phaseMap = {};

  metrics.forEach(metric => {
    collectCompFasesDataForMetric_(selectedObras, metric).forEach(item => {
      if (!phaseMap[item.key]) {
        phaseMap[item.key] = {
          key: item.key,
          name: item.name,
          values: { mao_obra: 0, materiais: 0, total: 0 },
          sortValue: 0
        };
      }
      phaseMap[item.key].values[metric] = Number(item.total) || 0;
    });
  });

  return sortCompFaseItems_(Object.values(phaseMap).map(item => {
    item.sortValue = metrics.includes('total')
      ? Number(item.values.total) || 0
      : metrics.reduce((sum, metric) => sum + (Number(item.values[metric]) || 0), 0);
    return item;
  })).filter(item => metrics.some(metric => (Number(item.values[metric]) || 0) > 0));
}

function compactCompFasesTotalForMobile_(items, selectedMetrics) {
  const list = Array.isArray(items) ? items.slice() : [];
  if (!isMobile() || list.length <= MOBILE_OBRA_CHART_TOP_PHASES) return list;

  const metrics = Array.isArray(selectedMetrics) ? selectedMetrics.slice() : [];
  const sorted = list.sort((a, b) => (b.sortValue || 0) - (a.sortValue || 0));
  const top = sorted.slice(0, MOBILE_OBRA_CHART_TOP_PHASES);
  const rest = sorted.slice(MOBILE_OBRA_CHART_TOP_PHASES);
  if (!rest.length) return top;

  const grouped = {
    key: 'outras-fases',
    name: 'Outras Fases',
    values: { mao_obra: 0, materiais: 0, total: 0 },
    sortValue: 0,
    _isGroupedOther: true
  };
  metrics.forEach(metric => {
    grouped.values[metric] = rest.reduce((sum, item) => sum + (Number(item.values && item.values[metric]) || 0), 0);
  });
  grouped.sortValue = rest.reduce((sum, item) => sum + (Number(item.sortValue) || 0), 0);
  top.push(grouped);
  return top;
}

function buildCompFasesTotalChart(obraNames) {
  if (compCharts.fasestotal) compCharts.fasestotal.destroy();

  const allObraNames = Array.isArray(obraNames) ? obraNames : [];
  const selectedMetrics = getCompFasesTotalSelectedMetrics_();
  updateCompFasesTotalPeriodLabel_();

  const availablePhases = collectAvailableCompFases_(allObraNames);
  const allPhaseData = collectCompFasesTotalMultiData_(allObraNames, selectedMetrics);
  pruneCompFasesTotalState_(availablePhases);
  const visibleKeys = getVisibleCompFasesTotalKeys_(availablePhases);
  syncCompFasesTotalControls_(availablePhases);

  const ctx = ensureCompFasesTotalCanvas_();
  if (!ctx) return;
  if (!availablePhases.length) {
    renderCompFasesTotalPlaceholder_('Sem fases no periodo');
    return;
  }
  if (!visibleKeys.size) {
    renderCompFasesTotalPlaceholder_('Selecione fases para visualizar');
    return;
  }

  const chartItems = allPhaseData.filter(item => visibleKeys.has(item.key));
  if (!chartItems.length) {
    renderCompFasesTotalPlaceholder_('Sem fases com custo no periodo');
    return;
  }

  const metricColorMap = {
    mao_obra: 'rgba(99,179,237,.78)',
    materiais: 'rgba(72,187,120,.78)',
    total: 'rgba(233,69,96,.78)'
  };
  const compactedItems = compactCompFasesTotalForMobile_(chartItems, selectedMetrics);
  const datasets = selectedMetrics.map(metric => ({
    label: getCompFasesTotalMetricLabel_(metric),
    data: compactedItems.map(item => Number(item.values[metric]) || 0),
    backgroundColor: metricColorMap[metric] || 'rgba(99,179,237,.78)',
    borderRadius: 4,
    borderWidth: 0,
    categoryPercentage: 0.86,
    barPercentage: 1
  }));

  compCharts.fasestotal = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: compactedItems.map(item => item.name),
      datasets: datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)
        ? false
        : { duration: isMobile() ? 180 : 260, easing: 'easeOutCubic' },
      plugins: {
        legend: selectedMetrics.length > 1 ? mLegend({ position: isMobile() ? 'bottom' : 'top' }) : { display: false },
        tooltip: {
          callbacks: {
            title: items => {
              if (!items || !items.length) return '';
              return String(items[0].label || '');
            },
            label: tipCtx => tipCtx.dataset.label + ': ' + fmt(tipCtx.raw)
          }
        }
      },
      scales: {
        y: {
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: {
            font: { size: isMobile() ? 9 : 10 },
            callback: v => v >= 1000 ? (v / 1000).toFixed(0) + 'k €' : v + ' €'
          }
        },
        x: {
          grid: { display: false },
          ticks: {
            font: { size: isMobile() ? 9 : 10 },
            callback: val => {
              const idx = Number(val);
              const label = Number.isFinite(idx) && compactedItems[idx] ? compactedItems[idx].name : String(val);
              return isMobile() ? abbreviateChartLabel_(label, 10) : label;
            }
          }
        }
      }
    }
  });
}

function compactCompFasesForMobile_(items) {
  const list = Array.isArray(items) ? items.slice() : [];
  if (!isMobile() || list.length <= MOBILE_OBRA_CHART_TOP_PHASES) return list;

  const sorted = list.sort((a, b) => (b.total || 0) - (a.total || 0));
  const top = sorted.slice(0, MOBILE_OBRA_CHART_TOP_PHASES);
  const rest = sorted.slice(MOBILE_OBRA_CHART_TOP_PHASES);
  if (!rest.length) return top;

  const grouped = { name: 'Outras Fases', total: 0, valuesByObra: {}, _isGroupedOther: true };
  rest.forEach(item => {
    grouped.total += Number(item.total) || 0;
    Object.entries(item.valuesByObra || {}).forEach(([obra, value]) => {
      grouped.valuesByObra[obra] = (grouped.valuesByObra[obra] || 0) + (Number(value) || 0);
    });
  });
  top.push(grouped);
  return top;
}

function getCompFaseSortRank_(label) {
  const key = normalizeFaseKey_(label);
  const idx = DEFAULT_COMP_FASES.findIndex(fase => normalizeFaseKey_(fase) === key);
  return idx === -1 ? Number.MAX_SAFE_INTEGER : idx;
}

function sortCompFaseItems_(items) {
  return (Array.isArray(items) ? items.slice() : []).sort((a, b) => {
    const rankDiff = getCompFaseSortRank_(a && a.name) - getCompFaseSortRank_(b && b.name);
    if (rankDiff !== 0) return rankDiff;
    return String(a && a.name || '').localeCompare(String(b && b.name || ''), 'pt');
  });
}

function shouldIncludeCompFase_(label) {

function collectAvailableCompFases_(selectedObras) {
  const selected = Array.isArray(selectedObras) ? selectedObras : [];
  const phaseMap = {};

  DEFAULT_COMP_FASES.forEach(fase => {
    const label = String(fase || '').trim() || 'Sem Fase';
    const key = normalizeFaseKey_(label);
    phaseMap[key] = { key, name: label, total: 0 };
  });

  selected.forEach(nome => {
    const obra = DATA && DATA.obras ? DATA.obras[nome] : null;
    if (!obra) return;

    (obra.fases || []).forEach(item => {
      const fase = String(item && item.Fase || '').trim() || 'Sem Fase';
      if (!shouldIncludeCompFase_(fase)) return;
      const key = normalizeFaseKey_(fase);
      if (!phaseMap[key]) phaseMap[key] = { key, name: fase, total: 0 };
      phaseMap[key].total += Number(item && item.Custo) || 0;
    });

    (obra.materiais_fases || []).forEach(item => {
      const fase = String(item && item.Fase || '').trim() || 'Sem Fase';
      if (!shouldIncludeCompFase_(fase)) return;
      const key = normalizeFaseKey_(fase);
      if (!phaseMap[key]) phaseMap[key] = { key, name: fase, total: 0 };
      phaseMap[key].total += Number(item && item.Custo) || 0;
    });

    (obra.assiduidade || []).forEach(worker => {
      Object.values(worker.dias || {}).forEach(day => {
        getDayPhaseList_(day, 'Sem Fase').forEach(fase => {
          if (!shouldIncludeCompFase_(fase)) return;
          const key = normalizeFaseKey_(fase);
          if (!phaseMap[key]) phaseMap[key] = { key, name: fase, total: 0 };
        });
      });
    });
  });

  return sortCompFaseItems_(Object.values(phaseMap));
}

function collectCompFasesDataForMetric_(selectedObras, metricKey) {
  const selected = Array.isArray(selectedObras) ? selectedObras : [];
  const selectedSet = new Set(selected);
  const perObra = {};
  const phaseMap = {};
  const metric = metricKey || 'mao_obra';
  const snapshot = getCurrentRangeSnapshot_();

  selected.forEach(nome => {
    perObra[nome] = {};
    if (metric !== 'materiais') {
      (snapshot.registosByObra[nome] || []).forEach(r => {
        if (r.falta) return;
        const fase = String(r.fase || '').trim() || 'Sem Fase';
        if (!shouldIncludeCompFase_(fase)) return;
        if (!perObra[nome][fase]) perObra[nome][fase] = { mao_obra: 0, materiais: 0, total: 0 };
        perObra[nome][fase].mao_obra += Number(r.custo) || 0;
      });
      (snapshot.legacyMaoByObra[nome] || []).forEach(r => {
        const fase = String(r.fase || '').trim() || 'Sem Fase';
        if (!shouldIncludeCompFase_(fase)) return;
        if (!perObra[nome][fase]) perObra[nome][fase] = { mao_obra: 0, materiais: 0, total: 0 };
        perObra[nome][fase].mao_obra += Number(r.custo) || 0;
      });
    }
  });

  if (metric !== 'mao_obra') {
    snapshot.materiais_all.forEach(m => {
      if (!selectedSet.has(m.obra)) return;
      const fase = String(m.fase || '').trim() || 'Sem Fase';
      if (!shouldIncludeCompFase_(fase)) return;
      if (!perObra[m.obra]) perObra[m.obra] = {};
      if (!perObra[m.obra][fase]) perObra[m.obra][fase] = { mao_obra: 0, materiais: 0, total: 0 };
      perObra[m.obra][fase].materiais += matCost(m);
    });
  }

  selected.forEach(nome => {
    Object.keys(perObra[nome] || {}).forEach(fase => {
      const entry = perObra[nome][fase];
      entry.total = (Number(entry.mao_obra) || 0) + (Number(entry.materiais) || 0);
      const value = Number(entry[metric]) || 0;
      if (value <= 0) return;
      const key = normalizeFaseKey_(fase);
      if (!phaseMap[key]) phaseMap[key] = { key, name: fase, total: 0, valuesByObra: {} };
      phaseMap[key].total += value;
      phaseMap[key].valuesByObra[nome] = value;
    });
  });

  return sortCompFaseItems_(Object.values(phaseMap));
}

function collectCompFasesData_(selectedObras) {
  return collectCompFasesDataForMetric_(selectedObras, compFasesMetric);
}

          }

  const fallbackList = DEFAULT_COMP_FASES.map(fase => ({
    key: normalizeFaseKey_(fase),
    name: fase,
    total: 0
  }));
  const list = ((Array.isArray(faseItems) && faseItems.length) ? faseItems : fallbackList)
    .filter(item => shouldIncludeCompFase_(item && item.name));

  fasesRow.innerHTML = list.map(item => {
    const labelTxt = String(item.name || 'Sem Fase');
    const key = normalizeFaseKey_(labelTxt);
    const active = !!compDiasSelectedKeys[key];
    const safeLabel = escapeHtml_(labelTxt);
    const encoded = encodeURIComponent(labelTxt);
    return '<button type="button" class="obra-fase-chip' + (active ? ' active' : '') + '"' +
      ' onclick="toggleCompDiasFaseSelection(\'' + encoded + '\')"' +
      ' aria-pressed="' + (active ? 'true' : 'false') + '"' +
      ' title="' + safeLabel + ' · ' + (Number(item.total) || 0) + ' dias">' + safeLabel + '</button>';
  }).join('');
}

function toggleCompDiasFaseSelection(faseEncoded) {

function resetCompDiasSelection() {

function collectCompDiasData_(selectedObras) {
  const selected = Array.isArray(selectedObras) ? selectedObras : [];
  const phaseMap = {};
  const snapshot = getCurrentRangeSnapshot_();

  selected.forEach(nome => {
    const phaseDaysByName = {};
    (snapshot.registosByObra[nome] || []).forEach(r => {
      const dateStr = r._normDate || normalizeDateKey_(r.data);
      if (!dateStr || r.falta) return;
      if ((Number(r.horas) || 0) <= 0 && (Number(r.custo) || 0) <= 0) return;
      const fase = String(r.fase || '').trim() || 'Sem Fase';
      if (!shouldIncludeCompFase_(fase)) return;
      if (!phaseDaysByName[fase]) phaseDaysByName[fase] = new Set();
      phaseDaysByName[fase].add(dateStr);
    });
    (snapshot.legacyMaoByObra[nome] || []).forEach(r => {
      const dateStr = r._normDate || normalizeDateKey_(r.data);
      if (!dateStr) return;
      if ((Number(r.horas) || 0) <= 0 && (Number(r.custo) || 0) <= 0) return;
      const fase = String(r.fase || '').trim() || 'Sem Fase';
      if (!shouldIncludeCompFase_(fase)) return;
      if (!phaseDaysByName[fase]) phaseDaysByName[fase] = new Set();
      phaseDaysByName[fase].add(dateStr);
    });

    Object.keys(phaseDaysByName).forEach(fase => {
      const value = phaseDaysByName[fase].size;
      if (value <= 0) return;
      const key = normalizeFaseKey_(fase);
      if (!phaseMap[key]) phaseMap[key] = { key, name: fase, total: 0, valuesByObra: {} };
      phaseMap[key].total += value;
      phaseMap[key].valuesByObra[nome] = value;
    });
  });

  return sortCompFaseItems_(Object.values(phaseMap));
}

function buildCompDiasFaseChart(obraNames) {
  if (compCharts.diasfase) compCharts.diasfase.destroy();

  const allObraNames = Array.isArray(obraNames) ? obraNames : [];
  updateCompDiasPeriodLabel_();

  Object.keys(compDiasSelectedObras).forEach(name => {
    if (!allObraNames.includes(name)) delete compDiasSelectedObras[name];
  });

  const selectedObras = getSelectedCompDiasObras_(allObraNames);
  const availablePhases = collectAvailableCompFases_(allObraNames);
  const chartPhaseData = collectCompDiasData_(selectedObras);
  const validPhaseKeys = new Set(availablePhases.map(item => item.key));
  Object.keys(compDiasSelectedKeys).forEach(key => {
    if (!validPhaseKeys.has(key)) delete compDiasSelectedKeys[key];
  });

  syncCompDiasControls_(allObraNames, availablePhases);

  const ctx = ensureCompDiasCanvas_();
  if (!ctx) return;
  if (!selectedObras.length) {
    renderCompDiasPlaceholder_('Selecione obras para comparar');
    return;
  }
  if (!availablePhases.length) {
    renderCompDiasPlaceholder_('Sem fases no periodo');
    return;
  }

  const selectedPhaseItems = chartPhaseData.filter(item => !!compDiasSelectedKeys[item.key]);
  if (!selectedPhaseItems.length) {
    renderCompDiasPlaceholder_('Selecione fases para visualizar');
    return;
  }

  const chartItems = compactCompFasesForMobile_(selectedPhaseItems);
  syncCompDiasControls_(allObraNames, availablePhases);

  const reduceMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  compCharts.diasfase = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: chartItems.map(item => item.name),
      datasets: selectedObras.map((obraName, index) => ({
        label: obraName,
        data: chartItems.map(item => Number(item.valuesByObra[obraName]) || 0),
        backgroundColor: CHART_PALETTE[index % CHART_PALETTE.length],
        borderRadius: 4
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: reduceMotion ? false : { duration: isMobile() ? 180 : 260, easing: 'easeOutCubic' },
      plugins: {
        legend: mLegend({ position: isMobile() ? 'bottom' : 'top' }),
        tooltip: {
          callbacks: {
            title: items => items && items[0] ? String(items[0].label || '') : '',
            label: tipCtx => tipCtx.dataset.label + ': ' + tipCtx.raw + ' dias'
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            font: { size: isMobile() ? 9 : 10 },
            callback: val => {
              const idx = Number(val);
              const label = Number.isFinite(idx) && chartItems[idx] ? chartItems[idx].name : String(val);
              return isMobile() ? abbreviateChartLabel_(label, 10) : label;
            }
          }
        },
        y: {
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { font: { size: isMobile() ? 9 : 10 }, stepSize: 1 }
        }
      }
    }
  });
}

/* ── Variáveis de estado da tabela de assiduidade ── */
let assidAllRows  = [];
let assidSortCol  = 'faltas';
let assidSortAsc  = false;

function buildAssidTable() {
  if (!DATA || !DATA.obras) return;
  const obras = DATA.obras;

  // nome → { funcao, faltas, faltasList[] }
  const agg = {};

  Object.keys(obras).forEach(obraNome => {
    const assid = obras[obraNome].assiduidade || [];
    assid.forEach(w => {
      if (!agg[w.nome]) {
        agg[w.nome] = { funcao: w.funcao || '—', faltas: 0, faltasList: [] };
      }
      Object.entries(w.dias).forEach(([dateStr, d]) => {
        if (!dateInRange(dateStr)) return;
        if (d.dispensado) agg[w.nome].dispensados = (agg[w.nome].dispensados || 0) + 1;
        if (!d.falta) return;
        agg[w.nome].faltas++;
        const parts = dateStr.split('-');
        agg[w.nome].faltasList.push({
          dataSort: dateStr,
          data:     parts[2] + '/' + parts[1],   // DD/MM
          motivo:   d.motivo  || '—',
          observacao: d.observacao || '\u2014',
          dispensado: !!d.dispensado,
          obra:     obraNome,
          fase:     (d.fases && d.fases.length > 0)
                      ? d.fases.join(', ')
                      : '—'
        });
      });
    });
  });

  // Apenas workers com faltas > 0
  assidAllRows = Object.entries(agg)
    .filter(([, a]) => a.faltas > 0 || (a.dispensados || 0) > 0)
    .map(([nome, a]) => ({
      nome,
      funcao:     a.funcao,
      faltas:     a.faltas,
      dispensados: a.dispensados || 0,
      faltasList: a.faltasList.sort((x, y) => y.dataSort.localeCompare(x.dataSort))
    }));

  assidSortCol = 'faltas';
  assidSortAsc = false;
  renderAssidTable();
}

function renderAssidTable() {
  const search = (document.getElementById('assid-search').value || '').toLowerCase();

  let rows = assidAllRows.filter(r =>
    !search || r.nome.toLowerCase().includes(search)
  );

  rows.sort((a, b) => {
    const va = a[assidSortCol], vb = b[assidSortCol];
    if (typeof va === 'string')
      return assidSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return assidSortAsc ? va - vb : vb - va;
  });

  const tbody = document.getElementById('assid-tbody');

  if (!rows.length) {
    tbody.innerHTML =
      '<tr><td colspan="3" style="text-align:center;padding:40px;color:var(--text-dim)">' +
      '<i class="fa-solid fa-circle-check" style="font-size:28px;display:block;' +
      'margin-bottom:12px;color:var(--success);opacity:.6"></i>' +
      'Sem faltas no período seleccionado</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const escNome = r.nome.replace(/'/g, "\\'");
    const faltasCell = r.faltas > 0
      ? '<span class="tag tag-red" style="cursor:pointer"' +
        ' onclick="event.stopPropagation();assidShowFaltas(\'' + escNome + '\',event)"' +
        ' title="Ver detalhe">' + r.faltas + '</span>'
      : '0';
    const dispBadge = r.dispensados > 0
      ? ' <span class="tag tag-amber" title="Registos com dispensado">Disp ' + r.dispensados + '</span>'
      : '';
    return '<tr>' +
      '<td data-label="Nome"><strong>' + r.nome + '</strong>' + dispBadge + '</td>' +
      '<td data-label="Função"><span class="tag tag-blue">' + r.funcao + '</span></td>' +
      '<td data-label="Faltas" class="td-center">' + faltasCell + '</td>' +
      '</tr>';
  }).join('');

  // Indicadores de ordenação
  const colMap = { nome: 0, funcao: 1, faltas: 2 };
  const ths = document.querySelectorAll('#assid-thead th');
  ths.forEach(th => {
    th.classList.remove('sort-active');
    const ic = th.querySelector('.sort-icon');
    if (ic) ic.className = 'fa-solid fa-sort sort-icon';
  });
  const idx = colMap[assidSortCol];
  if (ths[idx]) {
    ths[idx].classList.add('sort-active');
    const ic = ths[idx].querySelector('.sort-icon');
    if (ic) ic.className = 'fa-solid ' +
      (assidSortAsc ? 'fa-sort-up' : 'fa-sort-down') + ' sort-icon';
  }
}

function sortAssid(col) {
  assidSortAsc = assidSortCol === col ? !assidSortAsc
    : (col === 'nome' || col === 'funcao');
  assidSortCol = col;
  renderAssidTable();
}

function assidShowFaltas(nome, event) {
  const row = assidAllRows.find(r => r.nome === nome);
  if (!row || !row.faltasList.length) return;

  // Capturar rect antes do requestAnimationFrame (currentTarget é limpo após o handler)
  const clickRect = event && event.currentTarget
    ? event.currentTarget.getBoundingClientRect() : null;

  const bodyHtml = row.faltasList.map(f =>
    '<div class="assid-popup-item">' +
      '<span style="color:var(--accent);font-weight:700;min-width:42px">' + f.data + '</span>' +
      '<span style="color:var(--text-dim)">\u203a</span>' +
      '<span style="color:var(--text)">'  + f.motivo + '</span>' +
      (f.dispensado ? '<span class="tag tag-amber">Dispensado</span>' : '') +
      '<span style="color:var(--text-dim)">\u203a</span>' +
      '<span style="color:var(--info)">'  + f.obra   + '</span>' +
      '<span style="color:var(--text-dim)">\u203a</span>' +
      '<span style="color:var(--text-muted);font-size:11px">' + f.fase + '</span>' +
      '<span style="color:var(--text-dim)">\u203a</span>' +
      '<span style="color:var(--text-muted);font-size:11px">Obs: ' + (f.observacao || '\u2014') + '</span>' +
    '</div>'
  ).join('');

  const container = document.getElementById('assid-popup-container');
  container.innerHTML =
    '<div class="assid-popup-overlay" onclick="assidPopupClose()"></div>' +
    '<div class="assid-popup" id="assid-popup-inner" onclick="event.stopPropagation()">' +
      '<div class="assid-popup-header">' +
        '<span><i class="fa-solid fa-calendar-xmark" style="margin-right:8px;' +
        'color:var(--accent)"></i>Faltas de ' +
        nome.split(' ').slice(0, 2).join(' ') + ' (' + row.faltas + ')</span>' +
        '<button class="assid-popup-close" onclick="assidPopupClose()">' +
        '<i class="fa-solid fa-xmark"></i></button>' +
      '</div>' +
      '<div class="assid-popup-body">' + bodyHtml + '</div>' +
    '</div>';

  // Posicionar perto do elemento clicado
  requestAnimationFrame(() => {
    const popup = document.getElementById('assid-popup-inner');
    if (!popup || !clickRect) return;
    const pw    = popup.offsetWidth  || 300;
    const ph    = popup.offsetHeight || 200;
    let top  = clickRect.bottom + 8;
    let left = clickRect.left;
    if (left + pw > window.innerWidth  - 12) left = window.innerWidth  - pw - 12;
    if (left < 12) left = 12;
    if (top  + ph > window.innerHeight - 12) top  = clickRect.top - ph - 8;
    if (top  < 12) top  = 12;
    popup.style.top  = top  + 'px';
    popup.style.left = left + 'px';
  });
}

  document.getElementById('assid-popup-container').innerHTML = '';

/* ══════════════════════════════════════════════════════════
   GLOBAL DATE FILTER
   ══════════════════════════════════════════════════════════ */
function dateInRange(dateStr) {
  if (!globalDateFrom && !globalDateTo) return true;
  const d = normalizeDateKey_(dateStr);
  if (!d) return true;
  const from = normalizeDateKey_(globalDateFrom);
  const to = normalizeDateKey_(globalDateTo);
  if (from && d < from) return false;
  if (to && d > to) return false;
  return true;
}

function normalizeDateKey_(raw) {
  if (!raw) return '';

  if (raw instanceof Date && !isNaN(raw.getTime())) {
    const y = raw.getFullYear();
    const m = String(raw.getMonth() + 1).padStart(2, '0');
    const d = String(raw.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  const s = String(raw).trim();
  if (!s) return '';

  // ISO or timestamp-like
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);

  // dd/mm/yyyy or dd-mm-yyyy
  const pt = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (pt) {
    const d = String(pt[1]).padStart(2, '0');
    const m = String(pt[2]).padStart(2, '0');
    const y = pt[3];
    return `${y}-${m}-${d}`;
  }

  const parsed = new Date(s);
  if (!isNaN(parsed.getTime())) {
    const y = parsed.getFullYear();
    const m = String(parsed.getMonth() + 1).padStart(2, '0');
    const d = String(parsed.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  return s.slice(0, 10);
}

function computeFilteredGlobal() {
  if (!DATA || !DATA.obras) return DATA ? DATA.global : {};
  if (!globalDateFrom && !globalDateTo) return DATA.global;
  const snapshot = getCurrentRangeSnapshot_();
  if (snapshot.global) return snapshot.global;

  // Re-aggregate from daily data
  let custoMO = 0, horasTotal = 0, faltas = 0, totalAtrasos = 0;
  const workerSet = new Set();
  const obraSet = new Set();

  Object.keys(DATA.obras).forEach(nome => {
    const obra = DATA.obras[nome];
    (obra.daily || []).forEach(d => {
      if (!dateInRange(d.DATA_str)) return;
      custoMO += d.Custo || 0;
      horasTotal += d.Horas || 0;
      obraSet.add(nome);
    });
    // Workers and faltas from assiduidade if available
    (obra.assiduidade || []).forEach(w => {
      Object.entries(w.dias || {}).forEach(([dateStr, dayData]) => {
        if (!dateInRange(dateStr)) return;
        if (dayData.falta) faltas++;
        if (dayData.atraso_min) totalAtrasos += dayData.atraso_min;
        if ((Number(dayData.horas) || 0) > 0 || (Number(dayData.custo) || 0) > 0) workerSet.add(w.nome);
      });
    });
  });

  const custoDesl = snapshot.deslocacoesTotal;
  const custoMat = snapshot.materiaisTotal;

  const custoTotal = custoMO + custoDesl + custoMat;

  snapshot.global = {
    custo_total: custoTotal,
    custo_mao_obra: custoMO,
    custo_deslocacoes: custoDesl,
    custo_materiais: custoMat,
    horas_total: horasTotal,
    obras_ativas: obraSet.size,
    colaboradores: workerSet.size,
    faltas: faltas,
    total_atrasos: totalAtrasos,
    last_update: DATA.global.last_update,
  };

  return snapshot.global;
}

/* ══════════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
   ══════════════════════════════════════════════════════════ */
function showToast(message, type, duration) {
  type = type || 'info';
  duration = duration || 6000;
  const container = document.getElementById('toast-container');
  if (!container) return;

  const icons = {
    warning: 'fa-triangle-exclamation',
    danger:  'fa-circle-exclamation',
    info:    'fa-circle-info',
    success: 'fa-circle-check'
  };

  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.innerHTML = '<i class="fa-solid ' + (icons[type] || icons.info) + '"></i>' +
    '<span>' + message + '</span>' +
    '<button class="toast-close" onclick="this.parentElement.classList.add(\'removing\');setTimeout(()=>this.parentElement.remove(),300)">' +
    '<i class="fa-solid fa-xmark"></i></button>';

  container.appendChild(toast);

  setTimeout(() => {
    if (toast.parentElement) {
      toast.classList.add('removing');
      setTimeout(() => { if (toast.parentElement) toast.remove(); }, 300);
    }
  }, duration);
}

function checkAlerts() {
  if (!DATA || !DATA.global) return;
  const g = DATA.global;

  // Check deslocações > 20% of total cost
  if (g.custo_total > 0 && g.custo_deslocacoes > 0) {
    const pctDesl = (g.custo_deslocacoes / g.custo_total) * 100;
    if (pctDesl > 20) {
      showToast('Deslocações representam ' + pctDesl.toFixed(1) + '% do custo total (acima de 20%)', 'warning', 8000);
    }
  }

}

  const sectionLabels = {
    overview:      'Visão Geral',
    'obra-detail': 'Obras',
    deslocacoes:   'Deslocações',
    equipa:        'Equipa',
    assiduidade:   'Assiduidade',
    comparativa:   'Comparativa'
  };

  if (currentSection !== 'overview') {
    parts.push({ label: sectionLabels[currentSection] || currentSection, section: currentSection });
  }

  if (currentSection === 'obra-detail' && currentObraName) {
    parts.push({ label: currentObraName });
  }

  if (currentSection === 'assiduidade') {
    if (assidCurrentObra) parts.push({ label: assidCurrentObra });
    if (assidCurrentWorker) parts.push({ label: assidCurrentWorker });
  }

  let html = '';
  parts.forEach((p, i) => {
    const isLast = i === parts.length - 1;
    if (i > 0) html += '<span class="breadcrumb-sep"><i class="fa-solid fa-chevron-right"></i></span>';
    if (isLast) {
      html += '<span class="breadcrumb-item active">' + p.label + '</span>';
    } else if (p.section) {
      html += '<span class="breadcrumb-item" style="cursor:pointer" onclick="showSection(\'' + p.section + '\')">' + p.label + '</span>';
    } else {
      html += '<span class="breadcrumb-item">' + p.label + '</span>';

   ══════════════════════════════════════════════════════════ */
function initResizeObservers() {
  if (typeof ResizeObserver === 'undefined') return;
  const observer = new ResizeObserver(() => {
    // Resize all active charts
    [obraCharts, deslCharts, equipaCharts, compCharts].forEach(dict => {
      Object.values(dict).forEach(chart => {
        if (chart && chart.canvas && chart.canvas.offsetParent) {
          chart.resize();
        }
      });
    });
    if (equipaDetailChart && equipaDetailChart.canvas && equipaDetailChart.canvas.offsetParent) {
      equipaDetailChart.resize();
    }
  });
  // Observe main content for size changes
  const main = document.getElementById('main-content');
  if (main) observer.observe(main);
}
